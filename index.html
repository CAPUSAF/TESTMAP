<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CAP Site Visit Dashboard</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:#f0f0ed}
#hdr{background:#1a2744;color:#fff;padding:9px 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
#hdr h1{font-size:14px;font-weight:600;white-space:nowrap}
.hs{background:rgba(255,255,255,.13);border-radius:5px;padding:3px 9px;font-size:10px;white-space:nowrap;line-height:1.5}
.hs b{font-size:14px;font-weight:700;display:block}
.hs.g{background:rgba(45,138,78,.45)}.hs.y{background:rgba(200,148,13,.45)}.hs.r{background:rgba(204,51,51,.45)}
#bar{background:#eef3fb;border-bottom:1px solid #c8d8f0;padding:5px 14px;font-size:11px;color:#1a2744;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
#bar b{font-weight:600}
#refreshbtn{font-size:11px;background:#1a2744;color:#fff;border:none;border-radius:4px;padding:3px 10px;cursor:pointer;height:24px;font-weight:600;margin-left:auto}
#refreshbtn:hover{background:#243560}
#ctrl{background:#fff;border-bottom:1px solid #ddd;padding:7px 14px;display:flex;gap:7px;flex-wrap:wrap;align-items:center}
.cg{display:flex;align-items:center;gap:4px}
.cg label{font-size:11px;color:#555;white-space:nowrap;font-weight:600}
select{font-size:11px;border:1px solid #ccc;border-radius:5px;padding:3px 6px;background:#fff;height:26px;cursor:pointer}
.rbtn{font-size:11px;background:#1a2744;color:#fff;border:none;border-radius:5px;padding:3px 10px;cursor:pointer;height:26px;font-weight:600}
.rbtn:hover{background:#243560}
.legrow{display:flex;align-items:center;gap:10px;margin-left:auto;flex-wrap:wrap}
.leg{display:flex;align-items:center;gap:4px;font-size:11px;color:#444;cursor:pointer;padding:2px 5px;border-radius:4px;user-select:none}
.leg:hover{background:#f0f0f0}.leg.off{opacity:.28}
.ldot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
#sbar{background:#f7f7f5;border-bottom:1px solid #e0e0da;padding:4px 14px;font-size:11px;color:#777}
#map{background:#e8e8e4}
#dp{position:fixed;bottom:20px;right:10px;z-index:1000;background:#fff;border:1px solid #ccc;border-radius:8px;padding:13px 14px;max-width:280px;font-size:12px;display:none;box-shadow:0 4px 16px rgba(0,0,0,.14)}
#dp h3{font-size:13px;font-weight:600;color:#1a2744;margin-bottom:5px;padding-right:22px;line-height:1.3}
.drow{display:flex;justify-content:space-between;gap:10px;padding:3px 0;border-bottom:1px solid #f0f0f0}
.drow:last-child{border:none}
.dlbl{color:#888;flex-shrink:0;font-size:11px}.dval{font-weight:500;text-align:right;word-break:break-word;font-size:11px}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;margin-bottom:5px}
.bg{background:#d4edda;color:#155724}.by{background:#fff3cd;color:#856404}.br{background:#f8d7da;color:#721c24}
#dpx{position:absolute;top:8px;right:10px;background:none;border:none;font-size:17px;cursor:pointer;color:#aaa}
</style>
</head>
<body>
<div id="hdr">
  <h1>CAP Site Visit Dashboard</h1>
  <div class="hs"><b id="h-total">-</b>Assets</div>
  <div class="hs"><b id="h-visits">-</b>Visit records</div>
  <div class="hs g"><b id="h-green" style="color:#aaffcc">-</b>Current &lt;1yr</div>
  <div class="hs y"><b id="h-yellow" style="color:#ffe58a">-</b>Monitored 1-3yr</div>
  <div class="hs r"><b id="h-red" style="color:#ffaaaa">-</b>Overdue / not visited</div>
</div>
<div id="bar">
  <b>Live visits:</b>
  <span id="bar-status">Loading from Google Sheets...</span>
  <button id="refreshbtn" onclick="fetchLiveVisits()">&#8635; Refresh</button>
</div>
<div id="ctrl">
  <div class="cg"><label>Region:</label><select id="f-region"><option value="">All Regions</option></select></div>
  <div class="cg"><label>Wing:</label><select id="f-state"><option value="">All Wings</option></select></div>
  <div class="cg"><label>Type:</label>
    <select id="f-type">
      <option value="">All Types</option>
      <option value="Unit">Units</option>
      <option value="Aircraft">Aircraft</option>
      <option value="Vehicle">Vehicles</option>
    </select></div>
  <div class="cg"><label>Visitor:</label><select id="f-visitor"><option value="">All Members</option></select></div>
  <div class="cg"><label>Status:</label>
    <select id="f-status">
      <option value="">All Status</option>
      <option value="green">Current (&lt;1yr)</option>
      <option value="yellow">Monitored (1-3yr)</option>
      <option value="red">Overdue / not visited</option>
    </select></div>
  <button class="rbtn" onclick="render()">Apply</button>
  <div class="legrow">
    <div class="leg" id="leg-green" onclick="toggleLeg('green')"><div class="ldot" style="background:#2d8a4e"></div>Current</div>
    <div class="leg" id="leg-yellow" onclick="toggleLeg('yellow')"><div class="ldot" style="background:#c8940d"></div>Monitored</div>
    <div class="leg" id="leg-red" onclick="toggleLeg('red')"><div class="ldot" style="background:#cc3333"></div>Overdue</div>
    <span style="font-size:11px;color:#999;margin-left:4px">&#9679;=Unit &nbsp;&#9650;=Aircraft &nbsp;&#9632;=Vehicle</span>
  </div>
</div>
<div id="sbar">Loading...</div>
<div id="map"></div>
<div id="dp">
  <button id="dpx" onclick="document.getElementById('dp').style.display='none'">&#215;</button>
  <h3 id="dp-title"></h3>
  <div id="dp-badge"></div>
  <div id="dp-rows"></div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>

var VISITS=[
['NER-NJ-067','11/5/2025','Unit Monitoring','Mevers, Kim','NJ','','NER-NJ-067','Overall, this is a very strong unit. They have a young cadet cadre, so they are challenged with a large squadron and low Cadet experience. Additionally, Cadet OR flights has been a problem due to weather. They did not met their goal, but had several days in the Fall and Spring that were cancelled due to weather. This does not seem like a problem with initiative or relationships with pilots, so I expect this to be a one off issue. During the meeting, cadets had an hour safety lesson, that was engaging and interactive. Followed by an hour CDI lesson. The approved CDI SM could not attend the m...'],
['NER-NJ-096','11/13/2025','Unit Monitoring','Mevers, Kim','NJ','','NER-NJ-096','Pineland Comp Sq was a great unit to visit. They conducted AE and CDI lessons, since this is a short month (Thanksgiving). They have a newly appointed CDI and followed required curriculum. AE used a circuit STEM kit, with a small group tasked to put it together (Apollo) while receiving instructions from a cadet in a different location (Houston). It was a great display of the importance of clear, concise communication. The lesson was recapped via the DLO method. This Sq is strong, though small in size. They indicated they are struggling to get assistance with OR flights. They have a pilot th...'],
['CAP25017','11/15/2025','Vehicle Monitoring','Munger, Bruce','DC','CAP25017 2012 Dodge RAM2500ST','MAR-DC-001','Older vehicle is well kept and used by wing leadership in support of authorized activities. Problem--a current insurance card was not present--the one in vehicle expired on 1 Oct 25. Notified Wing LG lead. CAP Form 132 (Vehicle Inspection Guide and Usage Data) bottom front signature block to annotate tire pressure check was not signed off in November. Wing LG notified.'],
['NER-NJ-804','11/18/2025','Unit Monitoring','Mevers, Kim','NJ','','NER-NJ-804','Cadet Squadron within a school has unique challenges and opportunities. During the visit, cadets were in uniform and practiced honor guard procedures. Squadron Commander is well informed and very active CAP member. The Squadron was cadet run, with three senior cadets doint the teaching. They incur unique challenges, based on school requirements. Though as a whole, this partnership seems to be excelling. The only concern raised by the Squadron Commander was a struggle with scheduling cadet Orientation Rides.'],
['NER-NY-072','11/18/2025','Unit Monitoring','Grossman, Halden','NY','','NER-NY-072','NY-072 was doing a combined meeting with NY-030 at the new NY-030 location. The Group Chaplain started the meeting with a character development discussion and exercises. I then discussed Air Force acession opportunities and pilot career paths. The meeting concluded with drill practice and an informal drill competition between the two squadrons.'],
['CAP05759','11/20/2025','Vehicle Monitoring','Nisbett, Alex','CO','CAP05759 2023 Ford Explorer','RMR-CO-098','Vehicle is newer and still in great condition. All documentation was available for inspection and appears to be maintained with mx receipts. Advised that they include safety information and contact info in their binder in cases of emergency.'],
['RMR-CO-098','11/20/2025','Unit Monitoring','Hum, Brian','CO','','RMR-CO-098','Overview Detachment 7 leadership conducted a scheduled unit visit on November 20, 2025, to the Fremont Starfire Cadet Squadron (RMR-CO-098) in Penrose, Colorado. In attendance were 20 cadets and 5 senior members. .Visit Details The Detachment 7 team arrived 30 minutes prior to the scheduled muster to meet with the Squadron Commander, Deputy Commander, and other senior members. The official muster began at 1830 hrs. The Squadron Commander provided an opportunity for the Detachment 7 team to introduce themselves, share career experiences, and conduct a Question & Answer (Q&A) session with the...'],
['NER-VT-007','11/23/2025','Unit Monitoring','King, Bruce','VT','','NER-VT-007','The weekly meeting was held at the squadron\'s building at Hartness State Airport, Weathersfield, Vt. The cadet commander lead the opening briefing, then instructed newer cadets on drill and physical fitness. I had the opportunity to discuss with the cadets my experiences as an Air Force engineering officer. I also answered questions about engineering colleges and the Arnold Air Society & Silver Wings organizations. My discussions with the Sq Safety Officer highlighted the need for more exterior lighting especially around the parking lot as winter meetings conclude past dusk. The Sq Command...'],
['NCR-MN-042','12/4/2025','Unit Monitoring','Trim, Jesse','MN','','NCR-MN-042','They did a nice job flexing the training plan due to inclement weather! No issues.'],
['CAP18006','12/13/2025','Vehicle Monitoring','Munger, Bruce','MD','CAP18006 2007 FORD E-350','MAR-MD-086','Attended Wicomico Sq event where they drove the van to a different location. Vehicle is well maintained and all documentation was present. This was the first use for December.'],
['CAP28105','12/14/2025','Vehicle Monitoring','King, Bruce','VT','CAP28105 Snowbird (trailer); Yamaha (cart) Unknown (trailer); G2 Golf (cart)','NER-VT-001','Visit was conducted with Maj Colvin (VTWG Chief of Staff). The CAP28105 ID number is used for both a trailer and a gasoline-powered cart. Both vehicles were previously assigned to support the Glider Academy at Hartness State Airport. With the discontinuation of the national glider program, VTWG plans to retire these vehicles. Maj Colvin stated that the ORMS retirement process would be initiated after today\'s observation. The vehicles are currently stored at Southern Vermont-Rutland Regional Airport. Registration, insurance, and inspection paperwork was not present for either vehicle. The t...'],
['NCR-NE-073','11/17/2025','Unit Monitoring','Eldridge, Golda','NE','','NCR-NE-073','Small unit in western Nebraska focused on the fire watch mission in the NebraskaNational Forest. One non local member phoned in. Safety, operations, aircraft maintenance were all covered thoroughly.'],
['NCR-NE-004','11/20/2025','Unit Monitoring','Eldridge, Golda','NE','','NCR-NE-004','Growing unit recovering from some turbulence in the squadron commander position. Cadet strength has double in last 12 months and senior members have a strong program encouraging engagement and growth for their new cadets.'],

function daysAgo(s){if(!s)return Infinity;var d=new Date(s);if(isNaN(d.getTime()))return Infinity;var n=(TODAY-d)/86400000;return n<0?0:n;}
function getCat(d){return d>=T_YELLOW?'red':d>=T_GREEN?'yellow':'green';}
function getCol(c){return c==='green'?'#2d8a4e':c==='yellow'?'#c8940d':'#cc3333';}
function statusTxt(d,c){
  if(c==='red'&&d===Infinity)return'No visit on record';
  if(d>=T_YELLOW)return Math.round(d)+' days ago - overdue';
  if(d>=T_GREEN)return Math.round(d)+' days ago - monitored';
  return Math.round(d)+' days ago - current';
}

// ── Visit lookup: keyed by charter+type for strict matching ───────────────
// VISITS format: [charter, visitDate, category, visitor, state, extra]
// category is now the visit type: 'Unit Monitoring', 'Aircraft Monitoring', 'Vehicle Monitoring'
function buildLookup(visits){
  // VISITS format: [lookupKey, visitDate, category, visitor, state, extra, charter]
  // lookupKey = tail number for Aircraft, vehicle ID for Vehicle, charter for Unit
  // This ensures each individual asset is matched precisely - no charter-level bleed
  var by={};
  for(var i=0;i<visits.length;i++){
    var v=visits[i];
    var key=v[0];  // already the precise lookup key
    var d=daysAgo(v[1]);
    if(!by[key]||d<by[key].days){
      by[key]={days:d,visitDate:v[1],visitor:v[3],category:v[2],extra:v[5],state:v[4],charter:v[6]||v[0],notes:v[7]||''};
    }
  }
  return by;
}

// ── CSV parser for live sheet ─────────────────────────────────────────────
// Expected headers: Visitor,VisitDate,Category,State,Charter_Unit,SubType,TailNo,
//                   Charter_Aircraft,MissionStatus,Charter_Vehicle,VehID,Year,Make,Model
function parseCSVRow(line){
  var result=[],cur='',inQ=false;
  for(var i=0;i<line.length;i++){
    var c=line[i];
    if(c==='"'){inQ=!inQ;continue;}
    if(c===','&&!inQ){result.push(cur.trim());cur='';continue;}
    cur+=c;
  }
  result.push(cur.trim());
  return result;
}
function findCol(hdr,names){
  for(var ni=0;ni<names.length;ni++){
    var n=names[ni].toLowerCase();
    for(var hi=0;hi<hdr.length;hi++){if(hdr[hi].toLowerCase().indexOf(n)>=0)return hi;}
  }
  return -1;
}

var CHARTER_PAT=/^[A-Z]{2,4}-[A-Z0-9]{2,4}-\d{3}/i;

function parseLiveCSV(text){
  try {
    text=text.replace(/\r\n/g,'\n').replace(/\r/g,'\n');
    var lines=text.trim().split('\n');
    if(lines.length<2) return [];
    var hdr=parseCSVRow(lines[0]);
    var iVis  =findCol(hdr,['visitor']);
    var iDate =findCol(hdr,['visitdate','visit date']);
    var iChU  =findCol(hdr,['charter_unit']);
    var iTail =findCol(hdr,['tailno']);
    var iChA  =findCol(hdr,['charter_aircraft']);
    var iStat =findCol(hdr,['missionstatus']);
    var iChV  =findCol(hdr,['charter_vehicle']);
    var iVID  =findCol(hdr,['vehid']);
    var iYr   =findCol(hdr,['year']);
    var iMk   =findCol(hdr,['make']);
    var iMd   =findCol(hdr,['model']);
    var iState=findCol(hdr,['state']);
    var iNotes=findCol(hdr,['notes','narrative','note']);
    if(iVis<0||iDate<0) return [];
    var visits=[],seen={};
    for(var i=1;i<lines.length;i++){
      try {
        var r=parseCSVRow(lines[i]);
        var visitor=iVis>=0?r[iVis].replace(/"/g,'').trim():'';
        var dt=iDate>=0?r[iDate].trim():'';
        if(!visitor||!dt) continue;
        var chU=iChU>=0?r[iChU].trim():'';
        var chA=iChA>=0?r[iChA].trim():'';
        var chV=iChV>=0?r[iChV].trim():'';
        var tail=iTail>=0?r[iTail].trim().toUpperCase():'';
        var status=iStat>=0?r[iStat].trim():'';
        var vID=iVID>=0?r[iVID].trim():'';
        var yr=iYr>=0?r[iYr].trim():'';
        var mk=iMk>=0?r[iMk].trim():'';
        var md=iMd>=0?r[iMd].trim():'';
        var state=iState>=0?r[iState].trim():'';
        var notes=iNotes>=0?(r[iNotes]||'').replace(/"/g,'').trim():'';
        if(chA&&CHARTER_PAT.test(chA)&&tail){
          var extra=tail+(status?' ('+status+')':'');
          var key=tail+'|'+dt+'|'+visitor;
          if(!seen[key]){seen[key]=1;visits.push([tail,dt,'Aircraft Monitoring',visitor,state,extra,chA,notes]);}
        }
        if(chV&&CHARTER_PAT.test(chV)&&vID){
          var parts=[vID,yr,mk,md].filter(Boolean);
          var key=vID+'|'+dt+'|'+visitor;
          if(!seen[key]){seen[key]=1;visits.push([vID,dt,'Vehicle Monitoring',visitor,state,parts.join(' '),chV,notes]);}
        }
        if(chU&&CHARTER_PAT.test(chU)){
          var key=chU+'|Unit|'+dt+'|'+visitor;
          if(!seen[key]){seen[key]=1;visits.push([chU,dt,'Unit Monitoring',visitor,state,'',chU,notes]);}
        }
      } catch(e){ continue; }
    }
    return visits;
  } catch(e){ return []; }
}


function uniqSort(arr){var s={},o=[];for(var i=0;i<arr.length;i++){if(arr[i]&&!s[arr[i]]){s[arr[i]]=true;o.push(arr[i]);}}o.sort();return o;}
function fillSel(id,items,fn){
  var el=document.getElementById(id),cur=el.value;
  while(el.options.length>1)el.remove(1);
  for(var i=0;i<items.length;i++){var o=document.createElement('option');o.value=items[i];o.textContent=fn?fn(items[i]):items[i];if(items[i]===cur)o.selected=true;el.appendChild(o);}
}
function populateFilters(){
  fillSel('f-region',uniqSort(ROSTER.map(function(r){return r[3];})),function(v){return RNAMES[v]||v;});
  fillSel('f-state',uniqSort(ROSTER.map(function(r){return r[2];})),function(v){return v+(SNAMES[v]?' - '+SNAMES[v]:'');});
  fillSel('f-visitor',uniqSort(allVisits.map(function(v){return v[3];}).filter(Boolean)));
}
document.getElementById('f-region').addEventListener('change',function(){
  var reg=this.value;
  var valid=uniqSort(ROSTER.filter(function(r){return!reg||r[3]===reg;}).map(function(r){return r[2];}));
  fillSel('f-state',valid,function(v){return v+(SNAMES[v]?' - '+SNAMES[v]:'');});
  render();
});
['f-state','f-visitor','f-type','f-status'].forEach(function(id){document.getElementById(id).addEventListener('change',render);});

// ── Render ────────────────────────────────────────────────────────────────
function render(){
  if(!ML)return;
  var reg=document.getElementById('f-region').value,st=document.getElementById('f-state').value;
  var visitor=document.getElementById('f-visitor').value,typeF=document.getElementById('f-type').value;
  var statusF=document.getElementById('f-status').value;

  var by=buildLookup(allVisits);

  var visCharters=null;
  if(visitor){
    visCharters={};
    for(var i=0;i<allVisits.length;i++){
      if(allVisits[i][3]===visitor)visCharters[allVisits[i][0]]=true;
    }
  }

  var counts={green:0,yellow:0,red:0};
  ML.clearLayers();
  var pins=[];

  for(var i=0;i<ROSTER.length;i++){
    var a=ROSTER[i];
    // a=[charter,type,state,region,name,detail,lat,lon]
    if(reg&&a[3]!==reg)continue;
    if(st&&a[2]!==st)continue;
    if(typeF&&a[1]!==typeF)continue;

    // Use tail/vehicleID as key for Aircraft/Vehicle, charter for Unit
    var key=a[1]==='Unit'?a[0]:a[4];
    if(visCharters&&!visCharters[key])continue;

    var v=by[key]||null;
    var days=v?v.days:Infinity;
    var cat=getCat(days);
    if(statusF&&cat!==statusF)continue;
    if(!vis[cat])continue;

    counts[cat]++;
    var lat,lon;
    if(a[6]&&a[7]&&Math.abs(a[6])>0.5&&Math.abs(a[7])>0.5){
      lat=Number(a[6])+(Math.random()-.5)*.008;
      lon=Number(a[7])+(Math.random()-.5)*.012;
    } else {
      var c=SC[a[2]];if(!c)continue;
      lat=c[0]+(Math.random()-.5)*1.2;
      lon=c[1]+(Math.random()-.5)*1.8;
    }
    pins.push({a:a,v:v,days:days,cat:cat,lat:lat,lon:lon});
  }

  // Draw red first so green renders on top
  ['red','yellow','green'].forEach(function(drawCat){
    for(var pi=0;pi<pins.length;pi++){
      (function(p){
        if(p.cat!==drawCat)return;
        var ico=makeIcon(p.a[1],getCol(p.cat));
        var mk=L.marker([p.lat,p.lon],{icon:ico}).addTo(ML);
        var dStr=p.days===Infinity?'No visit on record':Math.round(p.days)+' days ago';
        // Extra: show tail/vehicle detail from visit record or roster
        var extraStr=p.v&&p.v.extra?p.v.extra:(p.a[5]||'');
        mk.bindTooltip(
          '<b>'+(p.a[4]||p.a[0])+'</b>'+
          p.a[0]+' &bull; '+p.a[1]+
          (extraStr?'<br><i style="color:#888">'+extraStr+'</i>':'')+
          '<br>'+dStr+
          (p.v?'<br>Visited by: '+(p.v.visitor||'-'):''),
          {direction:'top',offset:[0,-8]}
        );
        mk.on('click',function(){showDetail(p);});
      })(pins[pi]);
    }
  });

  var shown=counts.green+counts.yellow+counts.red;
  document.getElementById('h-total').textContent=ROSTER.length;
  document.getElementById('h-visits').textContent=allVisits.length;
  document.getElementById('h-green').textContent=counts.green;
  document.getElementById('h-yellow').textContent=counts.yellow;
  document.getElementById('h-red').textContent=counts.red;
  document.getElementById('sbar').textContent=
    'Showing '+shown+' of '+ROSTER.length+' assets - '+
    counts.green+' current, '+counts.yellow+' monitored, '+counts.red+' overdue/not visited - '+
    allVisits.length+' visit records';
}

function showDetail(p){
  var a=p.a,v=p.v;
  document.getElementById('dp-title').textContent=(a[4]||a[0])+' ('+a[1]+')';
  var bc=p.cat==='green'?'bg':p.cat==='yellow'?'by':'br';
  document.getElementById('dp-badge').innerHTML='<span class="badge '+bc+'">'+statusTxt(p.days,p.cat)+'</span>';

  // Label for extra field changes by type
  var extraLabel=a[1]==='Aircraft'?'Tail # / Status':a[1]==='Vehicle'?'Vehicle ID / Details':'Unit Type';
  var extraVal=(v&&v.extra?v.extra:a[5])||'-';

  var rows=[
    ['Charter',a[0]],['Type',a[1]],[extraLabel,extraVal],
    ['Name',a[4]||'-'],
    ['Wing',a[2]+(SNAMES[a[2]]?' - '+SNAMES[a[2]]:'')],
    ['Region',RNAMES[a[3]]||a[3]||'-'],
    ['Last visit',v?(v.visitDate||'Unknown'):'Never visited'],
    ['Visited by',v?(v.visitor||'-'):'-'],
    ['Visit type',v?(v.category||'-'):'-']
  ];
  var html='';
  for(var i=0;i<rows.length;i++){
    if(!rows[i][1]||rows[i][1]==='-')continue;
    html+='<div class="drow"><span class="dlbl">'+rows[i][0]+'</span><span class="dval">'+rows[i][1]+'</span></div>';
  }
  if(v&&v.notes){
    html+='<div style="margin-top:8px;padding-top:8px;border-top:1px solid #f0f0f0">';
    html+='<div style="font-size:10px;color:#888;font-weight:600;margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em">Visitor Notes</div>';
    html+='<div id="dpnote" style="font-size:11px;color:#333;line-height:1.6;max-height:120px;overflow:hidden">'+v.notes+'</div>';
    if(v.notes.length>200){html+='<button onclick="var d=document.getElementById(\'dpnote\');if(d.style.maxHeight===\'\'){d.style.maxHeight=\'120px\';this.textContent=\'Show more\';}else{d.style.maxHeight=\'\';this.textContent=\'Show less\';}" style="margin-top:4px;font-size:10px;color:#1a2744;background:none;border:none;cursor:pointer;padding:0;text-decoration:underline">Show more</button>';}
    html+='</div>';
  }
  document.getElementById('dp-rows').innerHTML=html;
  document.getElementById('dp').style.display='block';
}

function toggleLeg(c){vis[c]=!vis[c];document.getElementById('leg-'+c).className=vis[c]?'leg':'leg off';render();}

// ── Live fetch ────────────────────────────────────────────────────────────
function fetchLiveVisits(){
  document.getElementById('bar-status').textContent='Fetching...';
  var xhr=new XMLHttpRequest();
  xhr.open('GET',LIVE_VISITS_URL,true);
  xhr.timeout=12000;
  xhr.ontimeout=function(){document.getElementById('bar-status').textContent='Timed out - using embedded data';render();};
  xhr.onerror=function(){document.getElementById('bar-status').textContent='Network error - using embedded data';render();};
  xhr.onload=function(){
    if(xhr.status>=200&&xhr.status<300){
      var r=parseLiveCSV(xhr.responseText);
      if(r.length){
        allVisits=r;
        fillSel('f-visitor',uniqSort(allVisits.map(function(v){return v[3];}).filter(Boolean)));
        render();
        document.getElementById('bar-status').textContent='Live data loaded - '+r.length+' visit records ('+new Date().toLocaleTimeString()+')';
      } else {
        document.getElementById('bar-status').textContent='Sheet loaded but 0 records parsed - using embedded data';
        render();
      }
    } else {
      document.getElementById('bar-status').textContent='HTTP '+xhr.status+' - using embedded data';
      render();
    }
  };
  xhr.onerror=function(){
    document.getElementById('bar-status').textContent='Could not reach Google Sheets - using embedded data ('+(new Date().toLocaleDateString())+')';
    render();
  };
  xhr.send();
}

// ── Boot ──────────────────────────────────────────────────────────────────
function boot(){
  if(typeof L==='undefined'){document.getElementById('sbar').textContent='ERROR: Map library failed to load.';return;}
  initMap();
  allVisits=VISITS;  // ensure embedded data is loaded
  populateFilters();
  render();          // render immediately with embedded data
  fetchLiveVisits(); // then fetch live in background
}
if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',boot);}else{boot();}
